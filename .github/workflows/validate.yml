name: Validate catalog
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      # Validation rules come from the published neoplay package; --no-deps skips Qt.
      - run: pip install --no-deps neo-play
      - run: python tools/validate_catalog.py catalog.json
